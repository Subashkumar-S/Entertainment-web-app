# Local development stack: client + server + MongoDB + Redis, all in Docker.
#
# Reads the single repo-root .env (copy ../.env.example -> ../.env). Run from
# THIS directory and point Compose at it so paths and the env file both resolve:
#     cd deploy && docker compose --env-file ../.env up --build
#
# All compose-level variables are prefixed with CINEPLAN_ so this project's
# settings never collide with the other projects on the shared host. The
# in-container variable names (left of the colon) are what the app reads and are
# deliberately left unprefixed; the server's dotenv also aliases CINEPLAN_FOO ->
# FOO so native `npm run dev` reads the same file. Every value has a safe default
# — the stack comes up with no .env beyond the required CINEPLAN_SECRET /
# CINEPLAN_TMDB_API_KEY. Build contexts (`../server`, `../client`) point at root.
#
# Data-store URLs are env-configurable:
#   - Local (default): the bundled `mongo` and `redis` services below.
#   - Production: set CINEPLAN_MONGODB_URI / CINEPLAN_REDIS_URL to cloud
#     MongoDB Atlas + managed Redis — no compose or code change needed.
#
# MongoDB and Redis persist to host-side bind mounts under `./volumes/`.

services:
  server:
    build: ../server
    container_name: cineplan-server
    restart: always
    ports:
      - "${CINEPLAN_BIND_IP:-127.0.0.1}:${CINEPLAN_SERVER_HOST_PORT:-8091}:${CINEPLAN_PORT:-5000}"
    environment:
      PORT: "${CINEPLAN_PORT:-5000}"
      # Local defaults point at the mongo/redis containers below.
      # Override in production to use cloud MongoDB Atlas + managed Redis.
      MONGODB_URI: "${CINEPLAN_MONGODB_URI:-mongodb://mongo:27017/cineplan}"
      REDIS_URL: "${CINEPLAN_REDIS_URL:-redis://redis:6379}"
      # No default — Compose refuses to start if these are unset.
      SECRET: "${CINEPLAN_SECRET:?CINEPLAN_SECRET is required - set it in ./.env}"
      TMDB_API_KEY: "${CINEPLAN_TMDB_API_KEY:?CINEPLAN_TMDB_API_KEY is required - set it in ./.env}"
      # Public origin — set CINEPLAN_APP_URL to the subdomain in prod (behind Caddy
      # the client + /api are same-origin). The CORS allowlist (CLIENT_ORIGIN) and
      # the Google callback derive from it; either can still be set explicitly.
      APP_URL: "${CINEPLAN_APP_URL:-}"
      CLIENT_ORIGIN: "${CINEPLAN_CLIENT_ORIGIN:-}"
      # Optional Google OAuth: the "Continue with Google" button only appears
      # when both id and secret are set. Callback must match the Google console.
      GOOGLE_CLIENT_ID: "${CINEPLAN_GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${CINEPLAN_GOOGLE_CLIENT_SECRET:-}"
      GOOGLE_CALLBACK_URL: "${CINEPLAN_GOOGLE_CALLBACK_URL:-}"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - path: ../server/package.json
          action: rebuild
        - path: ../server/package-lock.json
          action: rebuild
        - path: ../server
          target: /app
          action: sync
    networks:
      - cineplan-network

  worker:
    build: ../worker
    container_name: cineplan-worker
    restart: always
    environment:
      MONGODB_URI: "${CINEPLAN_MONGODB_URI:-mongodb://mongo:27017/cineplan}"
      REDIS_URL: "${CINEPLAN_REDIS_URL:-redis://redis:6379}"
      # Reminder email delivery (Resend). Optional: the worker runs and logs a
      # warning until the key is set, so the stack still comes up locally.
      RESEND_API_KEY: "${CINEPLAN_RESEND_API_KEY:-}"
      EMAIL_FROM: "${CINEPLAN_EMAIL_FROM:-Cineplan <onboarding@resend.dev>}"
      # Used to build the "Open in Cineplan" deep link in the email. Derives from
      # the public origin (CINEPLAN_APP_URL in prod); CLIENT_ORIGIN overrides it.
      APP_URL: "${CINEPLAN_APP_URL:-}"
      CLIENT_ORIGIN: "${CINEPLAN_CLIENT_ORIGIN:-}"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - path: ../worker/package.json
          action: rebuild
        - path: ../worker/package-lock.json
          action: rebuild
        - path: ../worker
          target: /app
          action: sync
    networks:
      - cineplan-network

  client:
    build: ../client
    container_name: cineplan-client
    restart: always
    ports:
      - "${CINEPLAN_BIND_IP:-127.0.0.1}:${CINEPLAN_CLIENT_HOST_PORT:-8081}:3000"
    stdin_open: true
    environment:
      # Used by the client once TMDB/API calls are routed through the backend.
      # Keeps the VITE_ prefix (Vite only exposes VITE_*), so it is read straight
      # from the root .env rather than via a CINEPLAN_-prefixed alias.
      VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:5000/api}"
    # No source bind-mount: this stack serves the built `dist` baked into the
    # image (`serve -s dist`). Mounting ../client over /app would shadow that
    # dist with a stale host build. Use docker-compose.dev.yml for live reload.
    depends_on:
      - server
    develop:
      watch:
        - path: ../client/package.json
          action: rebuild
        - path: ../client/package-lock.json
          action: rebuild
        # Static build — any source change needs a rebuild (no HMR here).
        - path: ../client/src
          action: rebuild
        - path: ../client/index.html
          action: rebuild
    networks:
      - cineplan-network

  mongo:
    image: mongo:7
    container_name: cineplan-mongo
    restart: always
    # Internal only — reached by the server over the compose network, never published.
    volumes:
      - ./volumes/mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cineplan-network

  redis:
    image: redis:7-alpine
    container_name: cineplan-redis
    restart: always
    # Internal only — reached by the server over the compose network, never published.
    volumes:
      - ./volumes/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cineplan-network

networks:
  cineplan-network:
    driver: bridge
